# ┃                      Input Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Input wiki https://wiki.hyprland.org/Configuring/Variables/#input

input {
    kb_layout = usit          # custom: US + accenti IT su Alt destro (~/.config/xkb/symbols/usit)
    kb_variant = italian
    follow_mouse = 1 # 0|1|2|3 — hover gives keyboard focus (focus-follows-mouse)
    float_switch_override_focus = 2
}
