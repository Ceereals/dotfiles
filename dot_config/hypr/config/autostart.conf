# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Autostart Configuration                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = defaults.conf

# Autostart wiki https://wiki.hyprland.org/Configuring/Keywords/#executing
# Polkit agent (CachyOS bin, runs standalone in Hyprland)
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &

# Wayland/DBus env propagation to user systemd + DBus session bus
exec-once = systemctl --user import-environment &
exec-once = hash dbus-update-activation-environment 2>/dev/null
exec-once = dbus-update-activation-environment --systemd &

# Idle daemon (replaces $idlehandler/swayidle from defaults.conf)
exec-once = hypridle &

# Clipboard history (text + images) — fed into DMS clipboard
exec-once = wl-paste --type text  --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &

# Dynamic wallpaper: import Wayland env into systemd, then start awww + timewall.
# Under the "Hyprland (uwsm)" session these autostart via graphical-session.target;
# this makes them work under the plain "Hyprland" session too (idempotent no-op on uwsm).
exec-once = systemctl --user import-environment WAYLAND_DISPLAY && systemctl --user start awww-daemon.service timewall.service

# User shell: DankMaterialShell (DMS) is started by the `dms.service` systemd
# user unit (ExecStart=/usr/bin/dms run --session). Do not launch a shell here.
#
# Plain "Hyprland" session (non-uwsm) never activates graphical-session.target,
# so nothing pulls in dms.service (WantedBy= AND Requisite=graphical-session.target).
# Start our hyprland-session.target: it pulls graphical-session.target in as a
# dependency -> starts dms (+ awww/timewall/elephant via their WantedBy= symlinks).
# Idempotent no-op under "Hyprland (uwsm)" where the target is already active.
exec-once = systemctl --user import-environment WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP && systemctl --user start hyprland-session.target

# whispy dictation pill (separate Quickshell instance from DMS; reads state.json)
exec-once = env QML_IMPORT_PATH=$HOME/.config/quickshell qs -c whispy &
