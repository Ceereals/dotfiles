# User overrides — sourced LAST. Variable redefinitions are runtime-lazy.
# Shell: DankMaterialShell (DMS) — mirrors the niri config's `dms ipc call` binds.

# ─ DMS border colors (auto-generated by DMS). Sourced after variables.conf so DMS wins. ─
source = ../dms/colors.conf

# ─ Variable overrides ─
$terminal    = ghostty
$applauncher = dms ipc call spotlight toggle
$filemanager = nautilus

# ─ Apps ─
unbind = $mainMod, SPACE
unbind = $mainMod, RETURN
unbind = $mainMod, E
bindd = $mainMod, SPACE,  App launcher (DMS spotlight), exec, $applauncher
bindd = $mainMod, RETURN, Open Ghostty terminal,        exec, $terminal
bindd = $mainMod, E,      Open Nautilus filemanager,    exec, $filemanager
bindd = $mainMod, B,      Open Firefox,                 exec, firefox

# ─ DMS panels & menus (IPC targets verified against the niri config) ─
bindd = $mainMod,       D,      Notifications history (DMS), exec, dms ipc call notifications toggle
bindd = $mainMod,       N,      Control center (DMS),        exec, dms ipc call control-center toggle
bindd = $mainMod SHIFT, L,      Lock screen (DMS),           exec, dms ipc call lock lock
bindd = $mainMod SHIFT, W,      Wallpaper selector (DMS),    exec, dms ipc call dankdash wallpaper
bindd = $mainMod SHIFT, B,      Toggle DMS bar,              exec, dms ipc call bar toggle
bindd = $mainMod,       period, Emoji picker (DMS),          exec, dms ipc call spotlight openQuery emoji:
bindd = $mainMod,       escape, Session / power menu (DMS),  exec, dms ipc call powermenu toggle

# ─ Volume → DMS audio (with OSD). bindel = repeat + works when locked. ─
unbind = , XF86AudioRaiseVolume
unbind = , XF86AudioLowerVolume
unbind = , XF86AudioMute
bindel = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 5
bindel = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 5
bindl  = , XF86AudioMute,         exec, dms ipc call audio mute
bindl  = , XF86AudioMicMute,      exec, dms ipc call audio micmute

# ─ Brightness → DMS OSD ─
unbind = , XF86MonBrightnessUp
unbind = , XF86MonBrightnessDown
bindel = , XF86MonBrightnessUp,   exec, dms ipc call brightness increment 5 ""
bindel = , XF86MonBrightnessDown, exec, dms ipc call brightness decrement 5 ""

# ─ Media → DMS MPRIS ─
unbind = , XF86AudioPlay
unbind = , XF86AudioNext
unbind = , XF86AudioPrev
bindl = , XF86AudioPlay, exec, dms ipc call mpris playPause
bindl = , XF86AudioNext, exec, dms ipc call mpris next
bindl = , XF86AudioPrev, exec, dms ipc call mpris previous

# ─ Window focus: niri-style vim keys (hjkl). Frees MOD+L from lock (lock → MOD+SHIFT+L). ─
unbind = $mainMod, L          # was: loginctl lock-session
unbind = $mainMod, J          # was: togglesplit
bindd = $mainMod, H, Focus left,  movefocus, l
bindd = $mainMod, L, Focus right, movefocus, r
bindd = $mainMod, K, Focus up,    movefocus, u
bindd = $mainMod, J, Focus down,  movefocus, d

# ─ Window modes ─
unbind = $mainMod, Q
unbind = $mainMod, W
bindd = $mainMod, W, Close (not kill) current window, killactive
bindd = $mainMod, T, Toggle window floating,          togglefloating

# ─ Universal copy/paste/cut (Omarchy-style: Ctrl+Insert / Shift+Insert work in terminals AND GUIs) ─
unbind = $mainMod, V
bindd = $mainMod, C, Universal copy,  sendshortcut, CTRL, Insert,
bindd = $mainMod, V, Universal paste, sendshortcut, SHIFT, Insert,
bindd = $mainMod, X, Universal cut,   sendshortcut, CTRL, X,

# ─ Clipboard history (DMS) ─
bindd = $mainMod CTRL, V, Clipboard history (DMS), exec, dms ipc call clipboard toggle

# ─ Screenshots (niri parity: CTRL+SHIFT+1/2/3). Template Print binds kept, no conflict. ─
bindd = CTRL SHIFT, 1, Screenshot area,   exec, $shot-region
bindd = CTRL SHIFT, 2, Screenshot output, exec, $shot-screen
bindd = CTRL SHIFT, 3, Screenshot window, exec, $shot-window

# ─ Cheatsheet → niri's overlay chord MOD+SHIFT+ESCAPE (MOD+K is now focus-up) ─
unbind = $mainMod, K
bindd = $mainMod SHIFT, ESCAPE, Show keybind cheatsheet, exec, ghostty --class=keybind-cheatsheet -e ~/.config/hypr/scripts/keybind-cheatsheet.sh

windowrule = float on,     match:class ^(keybind-cheatsheet)$
windowrule = size 900 600, match:class ^(keybind-cheatsheet)$
windowrule = center on,    match:class ^(keybind-cheatsheet)$

# ─ Session / power (niri parity) ─
bindd = CTRL ALT, DELETE,   Exit Hyprland,      exit
bindd = $mainMod SHIFT, P,  Power off monitors, exec, hyprctl dispatch dpms off
bindd = $mainMod, TAB,      Previous workspace, workspace, previous

# ─ Notes: niri binds with no clean dwindle equivalent are intentionally unbound: ─
#   MOD+O toggle-overview, MOD+SHIFT+T column-tabbed, MOD+SHIFT+CTRL+ESCAPE shortcut-inhibitor,
#   column width / center / monitor-column-move (scrolling-layout only).

# ─ whispy dictation (toggle: press to start, press again to stop + transcribe) ─
bindd = $mainMod ALT,       SPACE, Toggle dictation, exec, /home/ceereals/.cargo/bin/whispy-client toggle
bindd = $mainMod ALT SHIFT, SPACE, Cancel dictation, exec, /home/ceereals/.cargo/bin/whispy-client cancel
