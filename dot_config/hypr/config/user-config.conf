# User overrides — sourced LAST. Variable redefinitions are runtime-lazy.

# ─ Variable overrides ─
$terminal    = ghostty
$applauncher = qs -c noctalia-shell ipc call launcher toggle
$filemanager = nautilus

# ─ Hardcoded-bind overrides ─
# Lock screen (was swaylock-fancy)
unbind = $mainMod, L
bindd  = $mainMod, L, Lock the screen, exec, loginctl lock-session

# Reload-bar (was killall -SIGUSR2 waybar)
unbind = $mainMod, O

# Volume keys: drop pactl + wob pipe → pamixer (Noctalia shows OSD)
unbind = , XF86AudioRaiseVolume
unbind = , XF86AudioLowerVolume
unbind = , XF86AudioMute
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindd  = , XF86AudioMute, Toggle mute, exec, pamixer -t

# ─ Noctalia IPC keybinds (targets+funcs verified against Services/Control/IPCService.qml) ─
bindd = $mainMod,       D,      Toggle Noctalia notifications history, exec, qs -c noctalia-shell ipc call notifications toggleHistory
bindd = $mainMod,       N,      Toggle Noctalia control center,        exec, qs -c noctalia-shell ipc call controlCenter toggle
bindd = $mainMod SHIFT, L,      Lock via Noctalia,                     exec, qs -c noctalia-shell ipc call lockScreen lock
bindd = $mainMod SHIFT, W,      Toggle Noctalia wallpaper selector,    exec, qs -c noctalia-shell ipc call wallpaper toggle
bindd = $mainMod,       period, Emoji picker (Noctalia launcher),      exec, qs -c noctalia-shell ipc call launcher emoji
bindd = $mainMod,       V,      Clipboard history (Noctalia launcher), exec, qs -c noctalia-shell ipc call launcher clipboard

# ─ Layer rules for Noctalia panels (PLACEHOLDERS) ─
# After first Noctalia run, capture real namespaces with: hyprctl layers
# Then uncomment, e.g.:
# layerrule = blur,        <noctalia-bar-namespace>
# layerrule = ignorezero,  <noctalia-bar-namespace>

# ─ Cheatsheet keybind (was: togglegroup) ─
unbind = $mainMod, K
bindd  = $mainMod, K, Show keybind cheatsheet, exec, ghostty --class=keybind-cheatsheet -e ~/.config/hypr/scripts/keybind-cheatsheet.sh

# ─ Brightness keys → Noctalia OSD ─
unbind = , XF86MonBrightnessUp
unbind = , XF86MonBrightnessDown
bindel = , XF86MonBrightnessUp,   exec, qs -c noctalia-shell ipc call brightness increase
bindel = , XF86MonBrightnessDown, exec, qs -c noctalia-shell ipc call brightness decrease

# ─ Media keys → Noctalia media controller ─
unbind = , XF86AudioPlay
unbind = , XF86AudioNext
unbind = , XF86AudioPrev
bindd  = , XF86AudioPlay, Toggle play/pause via Noctalia, exec, qs -c noctalia-shell ipc call media playPause
bindd  = , XF86AudioNext, Next track via Noctalia,        exec, qs -c noctalia-shell ipc call media next
bindd  = , XF86AudioPrev, Previous track via Noctalia,    exec, qs -c noctalia-shell ipc call media previous

# ─ Session menu + bar toggle ─
bindd  = $mainMod, escape, Toggle Noctalia session menu, exec, qs -c noctalia-shell ipc call sessionMenu toggle
bindd  = $mainMod, B,      Toggle Noctalia bar,          exec, qs -c noctalia-shell ipc call bar toggle

# ─ Window rules per la finestra cheatsheet ─
windowrule = float on,     match:class ^(keybind-cheatsheet)$
windowrule = size 900 600, match:class ^(keybind-cheatsheet)$
windowrule = center on,    match:class ^(keybind-cheatsheet)$

# ─ Window close on SUPER+W (was: SUPER+Q killactive in template) ─
unbind = $mainMod, Q
unbind = $mainMod, W
bindd  = $mainMod, W, Close (not kill) current window, killactive

# ─ Float toggle off V (V is now reserved for universal paste, Omarchy-style) ─
unbind = $mainMod, V
bindd  = $mainMod SHIFT, V, Switch current window between floating and tiling mode, togglefloating

# ─ Universal copy/paste/cut (Omarchy-style: Ctrl+Insert / Shift+Insert work in terminals AND GUIs) ─
bindd = $mainMod, C, Universal copy,  sendshortcut, CTRL, Insert,
bindd = $mainMod, V, Universal paste, sendshortcut, SHIFT, Insert,
bindd = $mainMod, X, Universal cut,   sendshortcut, CTRL, X,

# ─ Clipboard manager via Noctalia (Omarchy convention: SUPER+CTRL+V) ─
bindd = $mainMod CTRL, V, Clipboard history (Noctalia), exec, qs -c noctalia-shell ipc call launcher clipboard

# ─ Description override per cheatsheet (template descrizioni mostravano alacritty / vuoto) ─
unbind = $mainMod, RETURN
unbind = $mainMod, E
bindd  = $mainMod, RETURN, Open Ghostty terminal,     exec, $terminal
bindd  = $mainMod, E,      Open Nautilus filemanager, exec, $filemanager
