# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃           Scrolling Layout — config + bindings              ┃
# ┃  Active only when general:layout = scrolling.               ┃
# ┃  Toggle with SUPER+ALT+S. Other binds use SUPER+ALT+...     ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# https://wiki.hypr.land/0.54.0/Configuring/Scrolling-Layout/
scrolling {
    fullscreen_on_one_column = true
    column_width             = 0.5
    explicit_column_widths   = 0.333, 0.5, 0.667, 1.0
    direction                = right
    follow_focus             = true
    follow_min_visible       = 0.4
    focus_fit_method         = 1                                   # 0=center, 1=fit
}

# ─ Layout toggle (dwindle <-> scrolling, with toast) ─
bindd = SUPER ALT, S, Toggle scrolling/dwindle layout, exec, ~/.config/hypr/scripts/toggle-scrolling.sh

# ─ Focus (vim-style hjkl) ─
bindd = SUPER ALT, H, Scrolling: focus column left,  layoutmsg, focus l
bindd = SUPER ALT, L, Scrolling: focus column right, layoutmsg, focus r
bindd = SUPER ALT, K, Scrolling: focus window up,    layoutmsg, focus u
bindd = SUPER ALT, J, Scrolling: focus window down,  layoutmsg, focus d

# ─ Swap columns horizontally ─
bindd = SUPER ALT SHIFT, H, Scrolling: swap column left,  layoutmsg, swapcol l
bindd = SUPER ALT SHIFT, L, Scrolling: swap column right, layoutmsg, swapcol r

# ─ Column width / promote / fit ─
bindd = SUPER ALT, W, Scrolling: cycle column width,         layoutmsg, colresize +conf
bindd = SUPER ALT, P, Scrolling: promote window to own column, layoutmsg, promote
bindd = SUPER ALT, F, Scrolling: fit active column,          layoutmsg, fit active
bindd = SUPER ALT, A, Scrolling: fit all columns,            layoutmsg, fit all
bindd = SUPER ALT, V, Scrolling: fit visible columns,        layoutmsg, fit visible

# ─ Scroll the tape (horizontal layout movement) ─
bindd = SUPER ALT, comma,  Scrolling: tape left  (1 column), layoutmsg, move -col
bindd = SUPER ALT, period, Scrolling: tape right (1 column), layoutmsg, move +col
