# Configuration file for timewall

# Geographical location for sun-position based wallpapers (Empoli, Tuscany).
# Unused by "time" scheduled HEICs (e.g. the-cliffs), but needed for "solar" ones.
[location]
lat = 43.7177
lon = 10.9461

# Custom setter: wrapper script that paints the frame via awww (smooth crossfade)
# and then regenerates the DMS matugen theme from the same frame, so the Material You
# colors follow the wallpaper through the day. %f = current frame image path.
[setter]
command = ['/home/ceereals/.local/bin/timewall-matugen.sh', '%f']
overlap = 0
quiet = false

# How often the daemon re-evaluates which frame to show (daemon mode).
[daemon]
update_interval_seconds = 300
