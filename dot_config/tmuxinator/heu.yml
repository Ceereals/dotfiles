# ~/.config/tmuxinator/heu.yml
# Tmuxinator configuration for heu-monorepo
#
# Usage:
#   tmuxinator start heu
#   tmuxinator stop heu

name: heu
root: ~/Work/heu-monorepo

windows:
  - editor: nvim .
  - dev: pnpm denv:watch
  - lazydocker: cd packages/denv && lazydocker
  - lazygit: lazygit
  - opencode: opencode
  - claude: claude
  - terminal:
