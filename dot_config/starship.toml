add_newline = true
command_timeout = 500

format = "[$username$hostname$directory]($style)$cmd_duration$character"
right_format = "$git_branch$git_status"

[character]
error_symbol = "[✗](bold red)"
success_symbol = "[❯](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[git:$branch]($style)"
style = "italic cyan"

[git_status]
format     = '[$all_status]($style)'
style      = "cyan"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = "* "
stashed    = "≡ "
staged     = "+ "
renamed    = "» "
deleted    = "✘ "

[username]
show_always = false
format = "[$user]($style)@"
style_user = "italic yellow"
style_root = "bold red"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold yellow"

[cmd_duration]
min_time = 2_000
format = " [⏱ $duration]($style)"
style = "italic dimmed yellow"

[python]
format = '[ ${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
symbol = " "
style = "italic yellow"

[rust]
format = "[ $symbol($version)]($style) "
symbol = " "
style = "italic red"

[golang]
format = "[ $symbol($version)]($style) "
symbol = " "
style = "italic cyan"

[bun]
format = "[ $symbol($version)]($style) "
symbol = " "
style = "italic dimmed"
